<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>arXiv Survey Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #fafafa;
    --panel: #fff;
    --border: #e3e3e6;
    --muted: #6b7280;
    --text: #1f2937;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --tag-bg: #f3f4f6;
    --warn: #b45309;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: var(--bg); }
  header { padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .info { color: var(--muted); font-size: 12px; }
  header label { font-size: 12px; color: var(--muted); cursor: pointer; }
  header input[type=file] { font-size: 12px; }

  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: calc(100vh - 50px); }
  aside { background: var(--panel); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; max-height: calc(100vh - 50px); position: sticky; top: 50px; }
  aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 16px 0 6px; font-weight: 600; }
  aside h2:first-child { margin-top: 0; }
  aside input[type=search], aside input[type=number], aside select { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
  aside .checks { max-height: 180px; overflow-y: auto; border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; background: #fff; }
  aside .checks label { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 1px 0; cursor: pointer; gap: 4px; }
  aside .checks label .count { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 11px; }
  aside .checks label.zero { color: #cbd5e1; }
  aside .checks label.zero .count { color: #cbd5e1; }
  aside .row { display: flex; gap: 6px; }
  aside .row > * { flex: 1; }
  aside .toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
  aside .toggle .count { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 11px; margin-left: auto; }
  aside button { width: 100%; padding: 6px; font-size: 12px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; }
  aside button:hover { background: var(--tag-bg); }

  main { padding: 16px 20px; }
  .summary { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { background: #f9fafb; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
  th.sort-asc::after { content: " ▲"; color: var(--accent); }
  th.sort-desc::after { content: " ▼"; color: var(--accent); }
  tbody tr.row { cursor: pointer; }
  tbody tr.row:hover { background: var(--accent-bg); }
  tbody tr.detail td { background: #fcfcfd; padding: 14px 18px; border-top: none; }
  td.title-cell { max-width: 480px; }
  td.title-cell .title { font-weight: 500; }
  td.title-cell .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .tag { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 3px; background: var(--tag-bg); color: var(--text); margin-right: 4px; white-space: nowrap; }
  .tag.primary { background: #dbeafe; color: #1e40af; }
  .tag.track-main { background: #dcfce7; color: #166534; }
  .tag.track-findings { background: #fef3c7; color: #92400e; }
  .tag.track-workshop { background: #ede9fe; color: #5b21b6; }
  .tag.track-other, .tag.track-unknown { background: #f3f4f6; color: #4b5563; }
  .tag.cat { background: #e0e7ff; color: #3730a3; }
  .tag.modality { background: #fce7f3; color: #9d174d; }

  .ai-badge { display: inline-block; font-size: 9px; padding: 1px 4px; border-radius: 3px; background: #ede9fe; color: #5b21b6; letter-spacing: 0.05em; font-weight: 600; margin-left: 4px; vertical-align: middle; }

  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .fav-btn { background: none; border: none; cursor: pointer; padding: 2px 4px; font-size: 16px; line-height: 1; color: #d1d5db; }
  .fav-btn:hover { color: #f59e0b; }
  .fav-btn.on { color: #f59e0b; }
  th.fav-col, td.fav-col { width: 28px; text-align: center; padding-left: 6px; padding-right: 0; }

  .note-mark { display: inline-block; font-size: 12px; margin-left: 6px; vertical-align: middle; cursor: help; opacity: 0.85; }

  header .fav-controls { display: flex; gap: 6px; align-items: center; font-size: 12px; }
  header .fav-controls button { font-size: 12px; padding: 3px 8px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; }
  header .fav-controls button:hover { background: var(--tag-bg); }
  header .fav-count { color: #f59e0b; font-weight: 500; }
  header .note-count { color: #2563eb; font-weight: 500; }

  .note-editor { width: 100%; max-width: 900px; min-height: 80px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font: inherit; font-size: 13px; line-height: 1.5; resize: vertical; background: #fff; }
  .note-editor:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
  .note-status { font-size: 11px; color: var(--muted); margin-top: 4px; min-height: 14px; }
  .note-status.saved { color: #16a34a; }

  .detail-grid { display: grid; grid-template-columns: 100px 1fr; gap: 4px 12px; }
  .detail-grid .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding-top: 2px; }
  .detail-grid .v { font-size: 13px; }
  .abstract { line-height: 1.55; max-width: 900px; }
  .empty { padding: 40px; text-align: center; color: var(--muted); }

  .dr-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; font-size: 12px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; }
  .dr-btn:hover:not(:disabled) { background: var(--tag-bg); }
  .dr-btn:disabled { cursor: default; opacity: 0.6; }
  .dr-btn.regen { font-size: 11px; padding: 2px 8px; color: var(--muted); }
  .dr-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .dr-status { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 16px; }
  .dr-status.error { color: #b91c1c; }
  .dr-content { margin-top: 8px; max-width: 900px; }
  .dr-content .sec { margin-top: 10px; }
  .dr-content .sec:first-child { margin-top: 0; }
  .dr-content .sec h4 { margin: 0 0 4px; font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; }
  .dr-content .sec p { margin: 0; line-height: 1.6; white-space: pre-wrap; }
  .dr-content .sec ul { margin: 0; padding-left: 1.2em; line-height: 1.6; }
  .dr-content .sec ul li { margin-bottom: 2px; }
  .dr-content .sw { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
  @media (max-width: 720px) { .dr-content .sw { grid-template-columns: 1fr; } }
  .dr-content .sw h5 { margin: 0 0 4px; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .dr-tldr { background: var(--accent-bg); border-left: 3px solid var(--accent); padding: 8px 12px; border-radius: 0 4px 4px 0; }
  .dr-readonly { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; font-size: 12px; color: var(--muted); background: var(--tag-bg); border-radius: 4px; }

  header .api-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  header .api-badge.local { background: #dcfce7; color: #166534; }
  header .api-badge.remote { background: var(--tag-bg); color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>arXiv Survey</h1>
  <div class="info" id="info">no data loaded</div>
  <span class="api-badge remote" id="api-badge" title="GPT精読の生成APIに接続できません (cache済み結果の閲覧は可能)。お気に入り・メモなど他の機能は通常通り利用できます">🔒 GPT精読 閲覧のみ</span>
  <div class="fav-controls" style="margin-left:auto">
    <span class="fav-count" id="fav-count">★ 0</span>
    <span class="note-count" id="note-count">📝 0</span>
    <button id="export-favs" title="Download favorites & notes as JSON">export</button>
    <button id="import-favs-btn" title="Import favorites & notes from JSON (merges)">import</button>
    <input type="file" id="import-favs" accept=".json" style="display:none">
  </div>
  <label>
    load CSV: <input type="file" id="filepick" accept=".csv">
  </label>
</header>

<div class="layout">
<aside>
  <h2>search</h2>
  <input type="search" id="q" placeholder="title / abstract / keywords">

  <h2>favorites</h2>
  <label class="toggle"><input type="checkbox" id="favsonly"> ★ favorites only<span class="count" id="favsonly-count"></span></label>

  <h2>notes</h2>
  <label class="toggle"><input type="checkbox" id="notesonly"> 📝 with notes only<span class="count" id="notesonly-count"></span></label>

  <h2>cvpr 2026 only</h2>
  <label class="toggle"><input type="checkbox" id="cvpr2026only" checked> exclude no/unsure</label>

  <h2>track</h2>
  <div class="checks" id="track-checks"></div>

  <h2>task_primary</h2>
  <div class="checks" id="task-checks"></div>

  <h2>modality</h2>
  <div class="checks" id="modality-checks"></div>

  <h2>repo</h2>
  <label class="toggle"><input type="checkbox" id="hasrepo"> has repo url<span class="count" id="hasrepo-count"></span></label>

  <h2>authors</h2>
  <div class="row">
    <input type="number" id="amin" placeholder="min" min="1">
    <input type="number" id="amax" placeholder="max" min="1">
  </div>

  <h2>sort</h2>
  <select id="sort">
    <option value="published-desc">published (newest)</option>
    <option value="published-asc">published (oldest)</option>
    <option value="author_count-asc">author_count (asc)</option>
    <option value="author_count-desc">author_count (desc)</option>
    <option value="title-asc">title (a-z)</option>
  </select>

  <h2>&nbsp;</h2>
  <button id="reset">reset filters</button>
</aside>

<main>
  <div class="summary" id="summary"></div>
  <table id="tbl">
    <thead>
      <tr>
        <th class="fav-col"></th>
        <th data-sort="published">published</th>
        <th>title</th>
        <th title="GPTによる自動分類">task<span class="ai-badge">AI</span></th>
        <th title="GPTによる自動分類">track<span class="ai-badge">AI</span></th>
        <th>cat</th>
        <th class="num">authors</th>
        <th>links</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">no rows match the current filters.</div>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
const DEFAULT_CSV = 'outputs/cvpr2026_tasks.csv';
const DEFAULT_META = 'outputs/cvpr2026_tasks.meta.json';
const FAV_KEY = 'arxiv-survey:favorites';
const NOTES_KEY = 'arxiv-survey:notes';

const state = {
  rows: [],
  filtered: [],
  expandedId: null,
  sort: 'published-desc',
  favs: new Set(),
  notes: {},
};

function normId(id) {
  return (id || '').trim().replace(/v\d+$/, '');
}

function loadFavs() {
  try {
    state.favs = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));
  } catch (e) {
    state.favs = new Set();
  }
}

function saveFavs() {
  localStorage.setItem(FAV_KEY, JSON.stringify([...state.favs]));
}

function isFav(r) { return state.favs.has(normId(r.id)); }

function toggleFav(r) {
  const k = normId(r.id);
  if (state.favs.has(k)) state.favs.delete(k); else state.favs.add(k);
  saveFavs();
  updateFavCount();
}

function updateFavCount() {
  $('fav-count').textContent = `★ ${state.favs.size}`;
}

function loadNotes() {
  try {
    const v = JSON.parse(localStorage.getItem(NOTES_KEY) || '{}');
    state.notes = (v && typeof v === 'object' && !Array.isArray(v)) ? v : {};
  } catch (e) {
    state.notes = {};
  }
}

function saveNotes() {
  localStorage.setItem(NOTES_KEY, JSON.stringify(state.notes));
}

function getNote(r) {
  return state.notes[normId(r.id)] || '';
}

function setNote(r, text) {
  const k = normId(r.id);
  const t = (text || '').trim();
  if (t) state.notes[k] = t;
  else delete state.notes[k];
  saveNotes();
  updateNoteCount();
}

function hasNote(r) {
  return !!state.notes[normId(r.id)];
}

function updateNoteCount() {
  $('note-count').textContent = `📝 ${Object.keys(state.notes).length}`;
}

const $ = id => document.getElementById(id);

function parseCsv(text) {
  return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
}

function unique(arr, key) {
  const s = new Set();
  arr.forEach(r => { const v = (r[key] || '').trim(); if (v) s.add(v); });
  return [...s].sort();
}

function buildChecks(elId, values) {
  const el = $(elId);
  el.innerHTML = values.map(v =>
    `<label data-value="${escapeHtml(v)}"><span><input type="checkbox" value="${escapeHtml(v)}"> ${escapeHtml(v)}</span><span class="count"></span></label>`
  ).join('');
  el.querySelectorAll('input').forEach(cb => cb.addEventListener('change', render));
}

function checkedValues(elId) {
  return [...$(elId).querySelectorAll('input:checked')].map(cb => cb.value);
}

function applyFilters(skip = null) {
  const q = $('q').value.trim().toLowerCase();
  const tracks = skip === 'track' ? [] : checkedValues('track-checks');
  const tasks = skip === 'task' ? [] : checkedValues('task-checks');
  const mods = skip === 'modality' ? [] : checkedValues('modality-checks');
  const hasRepo = skip === 'hasrepo' ? false : $('hasrepo').checked;
  const favsOnly = skip === 'favsonly' ? false : $('favsonly').checked;
  const notesOnly = skip === 'notesonly' ? false : $('notesonly').checked;
  const cvprOnly = $('cvpr2026only').checked;
  const amin = parseInt($('amin').value, 10);
  const amax = parseInt($('amax').value, 10);

  return state.rows.filter(r => {
    if (favsOnly && !isFav(r)) return false;
    if (notesOnly && !hasNote(r)) return false;
    if (cvprOnly && r.is_cvpr2026 !== 'yes') return false;
    if (tracks.length && !tracks.includes(r.track)) return false;
    if (tasks.length && !tasks.includes(r.task_primary)) return false;
    if (mods.length && !mods.includes(r.modality)) return false;
    if (hasRepo && !r.repo_url) return false;
    const ac = parseInt(r.author_count, 10) || 0;
    if (!isNaN(amin) && ac < amin) return false;
    if (!isNaN(amax) && ac > amax) return false;
    if (q) {
      const hay = [
        r.title, r.summary, r.task_summary, r.task_keywords,
        r.task_secondary, r.comment, r.notes, r.authors,
        getNote(r),
      ].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function updateFacetCounts() {
  const groups = [
    { skip: 'track',    elId: 'track-checks',    key: 'track' },
    { skip: 'task',     elId: 'task-checks',     key: 'task_primary' },
    { skip: 'modality', elId: 'modality-checks', key: 'modality' },
  ];
  for (const g of groups) {
    const filtered = applyFilters(g.skip);
    const counts = new Map();
    for (const r of filtered) {
      const v = (r[g.key] || '').trim();
      if (v) counts.set(v, (counts.get(v) || 0) + 1);
    }
    document.querySelectorAll(`#${g.elId} label`).forEach(lbl => {
      const v = lbl.dataset.value;
      const c = counts.get(v) || 0;
      lbl.querySelector('.count').textContent = c;
      lbl.classList.toggle('zero', c === 0);
    });
  }
  // toggle filters: count of rows that would pass if this toggle were on
  const repoBase = applyFilters('hasrepo');
  $('hasrepo-count').textContent = repoBase.filter(r => r.repo_url).length;
  const favBase = applyFilters('favsonly');
  $('favsonly-count').textContent = favBase.filter(r => isFav(r)).length;
  const noteBase = applyFilters('notesonly');
  $('notesonly-count').textContent = noteBase.filter(r => hasNote(r)).length;
}

function applySort(rows) {
  const [k, dir] = state.sort.split('-');
  const sign = dir === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    let x = a[k] || '', y = b[k] || '';
    if (k === 'author_count') { x = +x; y = +y; }
    if (x < y) return -1 * sign;
    if (x > y) return 1 * sign;
    return 0;
  });
}

function fmtDate(s) {
  return (s || '').slice(0, 10);
}

function abstractLink(arxivId) {
  return arxivId.replace('http://', 'https://');
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function rowHtml(r) {
  const trackCls = `tag track-${r.track || 'unknown'}`;
  const sec = r.task_secondary ? `<span class="meta"> +${escapeHtml(r.task_secondary)}</span>` : '';
  const repo = r.repo_url
    ? `<a href="${r.repo_url}" target="_blank" rel="noopener">repo</a>`
    : '<span style="color:#cbd5e1">-</span>';
  const pdf = r.pdf_url
    ? `<a href="${r.pdf_url}" target="_blank" rel="noopener">pdf</a>`
    : '';
  const abs = r.id
    ? `<a href="${abstractLink(r.id)}" target="_blank" rel="noopener">abs</a>`
    : '';
  const favCls = isFav(r) ? 'fav-btn on' : 'fav-btn';
  const favChar = isFav(r) ? '★' : '☆';

  const noteMark = hasNote(r)
    ? `<span class="note-mark" title="${escapeHtml(getNote(r))}">📝</span>`
    : '';

  return `<tr class="row" data-id="${escapeHtml(r.id)}">
    <td class="fav-col"><button class="${favCls}" data-fav="${escapeHtml(r.id)}" title="toggle favorite">${favChar}</button></td>
    <td><span style="font-variant-numeric:tabular-nums">${fmtDate(r.published)}</span></td>
    <td class="title-cell">
      <div class="title">${escapeHtml(r.title)}${noteMark}</div>
      <div class="meta">${escapeHtml(r.task_summary || '')}</div>
    </td>
    <td><span class="tag primary">${escapeHtml(r.task_primary || '')}</span>${sec}</td>
    <td><span class="${trackCls}">${escapeHtml(r.track || '')}</span></td>
    <td><span class="tag cat">${escapeHtml(r.primary_category || '')}</span></td>
    <td class="num">${escapeHtml(r.author_count || '')}</td>
    <td>${abs} ${pdf} ${repo}</td>
  </tr>`;
}

function detailHtml(r) {
  const kw = r.task_keywords ? `<div><span class="tag modality">${escapeHtml(r.modality || '')}</span> ${escapeHtml(r.task_keywords).split(',').map(k => `<span class="tag">${k.trim()}</span>`).join('')}</div>` : '';
  return `<tr class="detail" data-detail-for="${escapeHtml(r.id)}"><td colspan="8">
    <div class="detail-grid">
      <div class="k">authors</div><div class="v">${escapeHtml(r.authors || '')}</div>
      <div class="k">categories</div><div class="v">${escapeHtml(r.categories || '')}</div>
      <div class="k">keywords</div><div class="v">${kw}</div>
      <div class="k">comment</div><div class="v">${escapeHtml(r.comment || '')} ${r.notes ? `<span class="tag" style="background:#fef3c7;color:#92400e">${escapeHtml(r.notes)}</span>` : ''}</div>
      <div class="k">abstract</div><div class="v abstract">${escapeHtml(r.summary || '')}</div>
      <div class="k">📝 note</div>
      <div class="v">
        <textarea class="note-editor" data-note-for="${escapeHtml(r.id)}" placeholder="add a personal note... (auto-saves on blur)">${escapeHtml(getNote(r))}</textarea>
        <div class="note-status" data-note-status-for="${escapeHtml(r.id)}"></div>
      </div>
      <div class="k">🤖 精読</div>
      <div class="v">
        <div class="dr-cell" data-dr-for="${escapeHtml(r.id)}">
          <button class="dr-btn" data-dr-action="run">🤖 GPT精読を実行</button>
          <div class="dr-status" data-dr-status></div>
          <div class="dr-content" data-dr-content></div>
        </div>
      </div>
    </div>
  </td></tr>`;
}

function render() {
  state.filtered = applySort(applyFilters());
  updateFacetCounts();
  const tbody = $('tbody');
  if (state.filtered.length === 0) {
    tbody.innerHTML = '';
    $('empty').style.display = 'block';
  } else {
    $('empty').style.display = 'none';
    tbody.innerHTML = state.filtered.map(r => {
      const main = rowHtml(r);
      return r.id === state.expandedId ? main + detailHtml(r) : main;
    }).join('');
  }
  $('summary').textContent = `${state.filtered.length} of ${state.rows.length} rows`;

  // sort indicators
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    const [k, d] = state.sort.split('-');
    if (th.dataset.sort === k) th.classList.add(d === 'asc' ? 'sort-asc' : 'sort-desc');
  });

  // detail row's dr-cell is rebuilt by tbody.innerHTML — re-init from cache every time
  document.querySelectorAll('.dr-cell:not([data-dr-initialized])').forEach(initDeepReadCell);
}

function bindRowClicks() {
  const tbody = $('tbody');
  tbody.addEventListener('click', e => {
    const favBtn = e.target.closest('.fav-btn');
    if (favBtn) {
      const id = favBtn.dataset.fav;
      const r = state.rows.find(row => row.id === id);
      if (r) { toggleFav(r); render(); }
      return;
    }
    if (e.target.closest('.note-editor')) return;
    if (e.target.closest('tr.detail')) return;
    const tr = e.target.closest('tr.row');
    if (!tr) return;
    if (e.target.tagName === 'A') return;
    const id = tr.dataset.id;
    state.expandedId = state.expandedId === id ? null : id;
    render();
  });

  tbody.addEventListener('input', e => {
    const ta = e.target.closest('.note-editor');
    if (!ta) return;
    const status = document.querySelector(`[data-note-status-for="${CSS.escape(ta.dataset.noteFor)}"]`);
    if (status) { status.textContent = 'editing…'; status.classList.remove('saved'); }
  });

  tbody.addEventListener('change', e => {
    const ta = e.target.closest('.note-editor');
    if (!ta) return;
    const id = ta.dataset.noteFor;
    const r = state.rows.find(row => row.id === id);
    if (!r) return;
    setNote(r, ta.value);
    const status = document.querySelector(`[data-note-status-for="${CSS.escape(id)}"]`);
    if (status) { status.textContent = 'saved'; status.classList.add('saved'); }
    updateFacetCounts();
  });
}

function renderInfo(rows, meta) {
  const el = $('info');
  if (meta) {
    const through = meta.latest_published || '?';
    const fetched = (meta.last_fetched_at || '').slice(0, 10);
    el.innerHTML = `📅 through <b>${escapeHtml(through)}</b> · ${rows} papers · fetched ${escapeHtml(fetched)}`;
    el.title = [
      `query:            ${meta.query || '(unknown)'}`,
      `latest published: ${meta.latest_published || '-'}`,
      `latest updated:   ${meta.latest_updated || '-'}`,
      `last fetched:     ${meta.last_fetched_at || '-'}`,
      `total rows:       ${meta.total_rows}`,
    ].join('\n');
  } else {
    el.textContent = `${rows} papers loaded`;
    el.title = '';
  }
}

function loadData(rows, meta = null) {
  state.rows = rows;
  renderInfo(rows.length, meta);
  buildChecks('track-checks', unique(rows, 'track'));
  buildChecks('task-checks', unique(rows, 'task_primary'));
  buildChecks('modality-checks', unique(rows, 'modality'));
  render();
}

async function fetchMeta() {
  try {
    const res = await fetch(DEFAULT_META);
    if (!res.ok) return null;
    return await res.json();
  } catch (e) {
    return null;
  }
}

async function loadDefault() {
  try {
    const [csvRes, meta] = await Promise.all([fetch(DEFAULT_CSV), fetchMeta()]);
    if (!csvRes.ok) throw new Error('not found');
    const text = await csvRes.text();
    loadData(parseCsv(text), meta);
  } catch (e) {
    $('info').textContent = `default file (${DEFAULT_CSV}) not loaded — use the file picker →`;
  }
}

function exportFavs() {
  const data = {
    type: 'arxiv-survey-data',
    exported_at: new Date().toISOString(),
    favorites: [...state.favs],
    notes: state.notes,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `arxiv-survey-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importFavs(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const incomingFavs = Array.isArray(data) ? data : data.favorites;
      const incomingNotes = (data && typeof data === 'object' && data.notes && typeof data.notes === 'object' && !Array.isArray(data.notes))
        ? data.notes : {};
      if (incomingFavs !== undefined && !Array.isArray(incomingFavs)) {
        throw new Error('invalid format');
      }

      const favBefore = state.favs.size;
      (incomingFavs || []).forEach(id => state.favs.add(id));
      saveFavs();

      const noteBefore = Object.keys(state.notes).length;
      let noteOverwritten = 0;
      for (const [k, v] of Object.entries(incomingNotes)) {
        if (typeof v !== 'string' || !v.trim()) continue;
        if (state.notes[k] && state.notes[k] !== v) noteOverwritten++;
        state.notes[k] = v;
      }
      saveNotes();

      updateFavCount();
      updateNoteCount();
      render();

      const favAdded = state.favs.size - favBefore;
      const noteAdded = Object.keys(state.notes).length - noteBefore;
      const msg = [
        `★ merged ${favAdded} new favorites (total: ${state.favs.size})`,
        `📝 merged ${noteAdded} new notes${noteOverwritten ? `, overwrote ${noteOverwritten}` : ''} (total: ${Object.keys(state.notes).length})`,
      ].join('\n');
      alert(msg);
    } catch (e) {
      alert('failed to import: ' + e.message);
    }
  };
  reader.readAsText(file);
}

// ---------- deep-read (GPT精読) ----------

// Whether scripts/server.py is reachable. Probed once at init. Determines whether
// the run/regen button is shown (true) or replaced with a read-only label (false).
let apiAvailable = false;

async function probeApi() {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 2000);
  try {
    const r = await fetch('/api/health', { signal: ctrl.signal });
    if (!r.ok) return;
    const j = await r.json();
    apiAvailable = !!(j && j.ok);
  } catch (e) {
    apiAvailable = false;
  } finally {
    clearTimeout(timer);
  }
  const badge = $('api-badge');
  if (apiAvailable) {
    badge.className = 'api-badge local';
    badge.textContent = '🤖 GPT精読 利用可';
    badge.title = 'ローカルサーバ稼働中。🤖 GPT精読を生成できます';
  } else {
    badge.className = 'api-badge remote';
    badge.textContent = '🔒 GPT精読 閲覧のみ';
    badge.title = 'GPT精読の生成APIに接続できません (cache済み結果の閲覧は可能)。お気に入り・メモなど他の機能は通常通り利用できます';
  }
}

// CSV's r.id is the full abs URL (e.g. "http://arxiv.org/abs/2605.05027v1").
// normId() preserves the URL form for fav/notes key compatibility. For deep-read
// we want the bare arxiv id ("2605.05027") so we can address outputs/deep_reads/<id>.json.
function bareArxivId(raw) {
  return (raw || '').trim()
    .replace(/^https?:\/\/arxiv\.org\/(abs|pdf)\//, '')
    .replace(/^arXiv:/i, '')
    .replace(/\.pdf$/, '')
    .replace(/v\d+$/, '');
}

const DR_STATIC_PATH = id => `outputs/deep_reads/${encodeURIComponent(id)}.json`;
const DR_API_PATH = id => `/api/deep-read/${encodeURIComponent(id)}`;

async function fetchDeepReadStatic(id) {
  try {
    const r = await fetch(DR_STATIC_PATH(id), { cache: 'no-cache' });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) {
    return null;
  }
}

function renderDeepRead(cell, payload) {
  const content = cell.querySelector('[data-dr-content]');
  const btn = cell.querySelector('[data-dr-action]');
  const status = cell.querySelector('[data-dr-status]');
  const s = payload.sections || {};
  const ts = (payload.generated_at || '').slice(0, 16).replace('T', ' ');
  const model = escapeHtml(payload.model || '');
  const sw = s.strengths_weaknesses || {};

  const ul = arr => `<ul>${(arr || []).map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>`;
  const p = txt => `<p>${escapeHtml(txt || '')}</p>`;

  content.innerHTML = `
    <div class="sec">
      <h4>TL;DR</h4>
      <div class="dr-tldr">${escapeHtml(s.tldr || '')}</div>
    </div>
    <div class="sec"><h4>課題・モチベーション</h4>${p(s.problem_motivation)}</div>
    <div class="sec"><h4>提案手法</h4>${p(s.proposed_method)}</div>
    <div class="sec"><h4>主要結果</h4>${ul(s.key_results)}</div>
    <div class="sec"><h4>強み・弱み</h4>
      <div class="sw">
        <div><h5>strengths</h5>${ul(sw.strengths)}</div>
        <div><h5>weaknesses</h5>${ul(sw.weaknesses)}</div>
      </div>
    </div>
    <div class="sec"><h4>関連研究との差分</h4>${p(s.related_work_diff)}</div>
    <div class="dr-meta">generated ${escapeHtml(ts)} UTC · model ${model}</div>
  `;
  status.textContent = '';
  status.classList.remove('error');
  if (apiAvailable) {
    btn.textContent = '🔁 再生成';
    btn.classList.add('regen');
    btn.dataset.drAction = 'regen';
    btn.disabled = false;
    btn.style.display = '';
  } else {
    // Remote: hide the regen button entirely — cached view only.
    btn.style.display = 'none';
  }
}

function setDeepReadStatus(cell, msg, isError = false) {
  const status = cell.querySelector('[data-dr-status]');
  status.textContent = msg;
  status.classList.toggle('error', !!isError);
}

async function pollDeepRead(cell, id, attempt = 0) {
  if (attempt > 90) {
    setDeepReadStatus(cell, '90秒待っても完了しませんでした。サーバログを確認してください。', true);
    cell.querySelector('[data-dr-action]').disabled = false;
    return;
  }
  await new Promise(r => setTimeout(r, attempt === 0 ? 1500 : 2000));
  let resp;
  try {
    resp = await fetch(DR_API_PATH(id));
  } catch (e) {
    setDeepReadStatus(cell, `通信エラー: ${e.message}`, true);
    cell.querySelector('[data-dr-action]').disabled = false;
    return;
  }
  let body = null;
  try { body = await resp.json(); } catch (e) {}
  if (resp.ok && body && body.status === 'done') {
    renderDeepRead(cell, body.result);
    return;
  }
  if (body && body.status === 'error') {
    setDeepReadStatus(cell, `生成失敗: ${body.error || '(unknown)'}`, true);
    cell.querySelector('[data-dr-action]').disabled = false;
    return;
  }
  setDeepReadStatus(cell, `生成中… (${attempt + 1})`);
  pollDeepRead(cell, id, attempt + 1);
}

async function runDeepRead(cell, id, opts = {}) {
  const btn = cell.querySelector('[data-dr-action]');
  btn.disabled = true;
  setDeepReadStatus(cell, opts.overwrite ? '再生成リクエスト中…' : 'サーバに問い合わせ中…');
  let resp;
  try {
    const url = DR_API_PATH(id) + (opts.overwrite ? '?overwrite=true' : '');
    resp = await fetch(url, { method: 'POST' });
  } catch (e) {
    setDeepReadStatus(
      cell,
      'ローカルサーバに接続できませんでした。`uv run scripts/server.py` を起動してください。',
      true
    );
    btn.disabled = false;
    return;
  }
  let body = null;
  try { body = await resp.json(); } catch (e) {}
  if (resp.ok && body && body.status === 'done') {
    renderDeepRead(cell, body.result);
    return;
  }
  if (resp.status === 202 || (body && body.status === 'running')) {
    setDeepReadStatus(cell, '生成中… (初回は30〜60秒かかります)');
    pollDeepRead(cell, id, 0);
    return;
  }
  const msg = (body && (body.detail || body.error)) || `HTTP ${resp.status}`;
  setDeepReadStatus(cell, `エラー: ${msg}`, true);
  btn.disabled = false;
}

async function initDeepReadCell(cell) {
  if (cell.dataset.drInitialized) return;
  cell.dataset.drInitialized = '1';
  const rawId = cell.dataset.drFor;
  const id = bareArxivId(rawId);

  // Reset the cell to a clean state so re-init (e.g. after probe resolves) doesn't
  // leave stale "read-only" labels in place when the API becomes available.
  const btn0 = cell.querySelector('[data-dr-action]');
  btn0.style.display = '';
  btn0.textContent = '🤖 GPT精読を実行';
  btn0.classList.remove('regen');
  btn0.dataset.drAction = 'run';
  btn0.disabled = false;
  const status0 = cell.querySelector('[data-dr-status]');
  status0.innerHTML = '';
  status0.classList.remove('error');
  cell.querySelector('[data-dr-content]').innerHTML = '';

  // 1) Try the static file (works on GH Pages and through the local server's mount).
  const cached = await fetchDeepReadStatic(id);
  if (cached) {
    renderDeepRead(cell, cached);
  } else if (!apiAvailable) {
    // No cached result and no local API → swap the button for a read-only notice.
    const btn = cell.querySelector('[data-dr-action]');
    btn.style.display = 'none';
    const status = cell.querySelector('[data-dr-status]');
    status.innerHTML = '<span class="dr-readonly">🔒 GPT精読はローカル起動時のみ生成可能</span>';
    return;
  }

  // 2) Wire the button (only matters when apiAvailable, but harmless to always bind).
  // Guarded so re-init after probe doesn't stack duplicate listeners on the same button.
  if (cell.dataset.drBtnBound) return;
  cell.dataset.drBtnBound = '1';
  const btn = cell.querySelector('[data-dr-action]');
  btn.addEventListener('click', () => {
    const action = btn.dataset.drAction;
    if (action === 'regen') {
      if (!confirm('既存の精読結果を上書きして再生成します。よろしいですか？')) return;
      runDeepRead(cell, id, { overwrite: true });
    } else {
      runDeepRead(cell, id, { overwrite: false });
    }
  });
}

function init() {
  loadFavs();
  loadNotes();
  updateFavCount();
  updateNoteCount();
  ['q', 'cvpr2026only', 'hasrepo', 'amin', 'amax', 'favsonly', 'notesonly'].forEach(id => {
    $(id).addEventListener('input', render);
  });
  $('sort').addEventListener('change', e => { state.sort = e.target.value; render(); });
  $('reset').addEventListener('click', () => {
    $('q').value = '';
    $('cvpr2026only').checked = true;
    $('hasrepo').checked = false;
    $('favsonly').checked = false;
    $('notesonly').checked = false;
    $('amin').value = ''; $('amax').value = '';
    document.querySelectorAll('aside .checks input').forEach(cb => cb.checked = false);
    state.sort = 'published-desc';
    $('sort').value = 'published-desc';
    state.expandedId = null;
    render();
  });
  $('export-favs').addEventListener('click', exportFavs);
  $('import-favs-btn').addEventListener('click', () => $('import-favs').click());
  $('import-favs').addEventListener('change', e => {
    if (e.target.files[0]) importFavs(e.target.files[0]);
    e.target.value = '';
  });
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      const [ck, cd] = state.sort.split('-');
      state.sort = (ck === k && cd === 'desc') ? `${k}-asc` : `${k}-desc`;
      $('sort').value = state.sort;
      render();
    });
  });
  $('filepick').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => loadData(parseCsv(reader.result));
    reader.readAsText(f);
  });
  bindRowClicks();
  // Probe API first so dr-cells render with the correct button state.
  // If the user expands a row before this resolves, the cell will be re-init'd
  // after the probe completes (we clear data-dr-initialized below).
  probeApi().then(() => {
    document.querySelectorAll('.dr-cell[data-dr-initialized]').forEach(cell => {
      delete cell.dataset.drInitialized;
      initDeepReadCell(cell);
    });
  });
  loadDefault();
}

init();
</script>
